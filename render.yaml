services:
  - type: web
    name: racing-game
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: |
      echo "🚀 Installing dependencies..."
      npm install
      echo "🔄 Generating Prisma client..."
      npx prisma generate
      echo "🔄 Running migrations..."
      npx prisma migrate deploy || npx prisma db push --accept-data-loss
      echo "✅ Build complete!"
    startCommand: npm start
    healthCheckPath: /api/stats
    healthCheckTimeout: 5
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: racing-game-db
          property: connectionString

  - type: postgresql
    name: racing-game-db
    plan: free
    region: frankfurt
    databaseName: racing_game
    user: racing_user
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow all connections (for Render internal access)"
