services:
  - type: web
    name: racing-game
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: |
      echo "🚀 Очистка старого кеша..."
      rm -rf node_modules package-lock.json server/node_modules
      echo "📦 Установка зависимостей..."
      npm install
      echo "🔄 Генерация Prisma Client..."
      npx prisma generate --schema=./schema.prisma
      echo "🔄 Применение схемы БД..."
      npx prisma db push --accept-data-loss --schema=./schema.prisma
      echo "✅ Сборка завершена!"
    startCommand: |
      echo "🚀 Запуск сервера..."
      npm start
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: racing-game-db
          property: connectionString

databases:
  - name: racing-game-db
    plan: free
    region: frankfurt
    databaseName: racing_game
    user: racing_user
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow all"
